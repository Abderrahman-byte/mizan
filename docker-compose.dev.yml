# Mizan — DEVELOPMENT stack: Postgres + backend + frontend, both with hot reload.
#   backend : uvicorn --reload over the ./backend bind mount
#   frontend: Vite dev server (HMR) over the ./frontend bind mount
#
# Run:   docker compose -f docker-compose.dev.yml up --build
# Prod:  see docker-compose.prod.yml (layered on this file).
#
# Values come from DB_* / app env vars with sensible defaults; override them via a
# root .env file (compose reads it automatically) without editing this file.

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    # Host 5433 avoids clashing with a local Postgres on 5432.
    # Inside the network the backend still connects on db:5432.
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - mizan-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      # DB connection parts — DB_HOST/DB_PORT are the in-network address of the
      # db service (not the remapped host port).
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      JWT_SECRET: ${JWT_SECRET}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Browser origins allowed to call the API (comma-separated). Default covers the
      # docker dev frontend (host :5174) and a bare-metal Vite (:5173).
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:5174}
      # Token TTLs are not here — they're app constants in app/core/config.py.
    # Host 8088 avoids clashing with other local services (8000/8001 in use).
    ports:
      - "8088:8000"
    depends_on:
      db:
        condition: service_healthy
    # Mount source for live reload in local dev.
    volumes:
      - ./backend:/app
    # Apply migrations, then start the reloading server.
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend
      target: dev
    environment:
      # Consumed by the browser, so it must point at the backend's HOST port
      # (localhost:8088), not the in-network backend:8000.
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8088/api}
    # Host 5174 avoids clashing with a local Vite on 5173. Same port in/out keeps
    # Vite's HMR websocket happy.
    ports:
      - "5174:5174"
    depends_on:
      - backend
    # Mount source for hot reload; keep the image's node_modules (anonymous volume).
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5174

volumes:
  mizan-db-data:
